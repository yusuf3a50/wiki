# Netlify configuration file
# Configures build settings and serverless functions

[build]
  base = "react-state-neon-project"
  command = "npm run build"
  publish = "build"

# Configure serverless functions directory
# Functions run server-side and can safely access DATABASE_URL
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Local development configuration
# Run with: netlify dev
# IMPORTANT: Access the app at http://localhost:8888 (Netlify dev server)
# NOT at http://localhost:3000 (React dev server) to ensure functions work
[dev]
  command = "npm start"
  port = 8888
  publish = "build"
